<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinitix - Box Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      animation: pulse 2s ease-in-out infinite;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 15px;
      margin-bottom: 32px;
    }
    .loader {
      width: 48px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
    }
    .loader::after {
      content: '';
      position: absolute;
      left: -50%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #f59e0b, transparent);
      border-radius: 4px;
      animation: loading 1.2s ease-in-out infinite;
    }
    @keyframes loading {
      0% { left: -50%; }
      100% { left: 100%; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎬</div>
    <h1>Cinitix - Box Office</h1>
    <p class="subtitle">Connecting to your cinema...</p>
    <div class="loader"></div>
  </div>
</body>
</html>
