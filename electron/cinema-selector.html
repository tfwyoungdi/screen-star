<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Office - Cinema Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .logo {
      width: 80px; height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; font-weight: bold;
    }

    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: rgba(255, 255, 255, 0.7); font-size: 16px; margin-bottom: 32px; }

    .form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: rgba(255, 255, 255, 0.9); }

    input {
      width: 100%; padding: 14px 16px; font-size: 16px;
      border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
      background: rgba(255, 255, 255, 0.05); color: #fff; outline: none;
      transition: all 0.2s ease;
    }
    input::placeholder { color: rgba(255, 255, 255, 0.4); }
    input:focus { border-color: #f59e0b; background: rgba(255, 255, 255, 0.1); }

    .hint { font-size: 13px; color: rgba(255, 255, 255, 0.5); margin-top: 8px; }

    .error {
      background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5; padding: 12px 16px; border-radius: 10px;
      font-size: 14px; margin-bottom: 20px; display: none;
    }
    .error.show { display: block; }

    button {
      width: 100%; padding: 16px 24px; font-size: 16px; font-weight: 600;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: #fff; cursor: pointer; transition: all 0.2s ease;
    }
    button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(245, 158, 11, 0.4); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .loading { display: none; align-items: center; justify-content: center; gap: 8px; }
    .loading.show { display: flex; }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { margin-top: 32px; font-size: 13px; color: rgba(255, 255, 255, 0.4); }

    .step { display: none; }
    .step.active { display: block; }

    .step-indicator {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 24px;
    }
    .step-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.2); transition: background 0.3s;
    }
    .step-dot.active { background: #f59e0b; }
    .step-line { width: 40px; height: 2px; background: rgba(255, 255, 255, 0.2); }

    .cinema-info {
      background: rgba(255, 255, 255, 0.08); border-radius: 12px;
      padding: 16px; margin-bottom: 24px; text-align: left;
    }
    .cinema-info .cinema-name { font-size: 18px; font-weight: 600; }
    .cinema-info .cinema-slug { font-size: 13px; color: rgba(255, 255, 255, 0.5); margin-top: 4px; }

    .back-link {
      display: inline-block; margin-top: 16px; font-size: 14px;
      color: rgba(255, 255, 255, 0.6); cursor: pointer;
      text-decoration: underline; background: none; border: none;
      width: auto; padding: 0;
    }
    .back-link:hover { color: #fff; transform: none; box-shadow: none; }

    .password-wrapper { position: relative; }
    .toggle-password {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: rgba(255, 255, 255, 0.5);
      cursor: pointer; font-size: 14px; padding: 4px; width: auto;
    }
    .toggle-password:hover { color: #fff; transform: translateY(-50%); box-shadow: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎬</div>
    <h1>Box Office Setup</h1>

    <div class="step-indicator">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-line"></div>
      <div class="step-dot" id="dot2"></div>
    </div>

    <div class="error" id="error"></div>

    <!-- Step 1: Cinema Code -->
    <div class="step active" id="step1">
      <p class="subtitle">Enter your cinema's unique code</p>
      <form id="slugForm">
        <div class="form-group">
          <label for="cinemaSlug">Cinema Code</label>
          <input type="text" id="cinemaSlug" placeholder="e.g., grand-cinema" autocomplete="off" spellcheck="false" required />
          <p class="hint">This code was provided by your cinema administrator</p>
        </div>
        <button type="submit" id="slugBtn">
          <span class="button-text" id="slugBtnText">Next</span>
          <span class="loading" id="slugLoading"><span class="spinner"></span> Verifying...</span>
        </button>
      </form>
    </div>

    <!-- Step 2: Admin Authentication -->
    <div class="step" id="step2">
      <p class="subtitle">Cinema admin authorization required</p>
      <div class="cinema-info" id="cinemaInfo">
        <div class="cinema-name" id="cinemaNameDisplay"></div>
        <div class="cinema-slug" id="cinemaSlugDisplay"></div>
      </div>
      <form id="authForm">
        <div class="form-group">
          <label for="adminEmail">Admin Email</label>
          <input type="email" id="adminEmail" placeholder="admin@cinema.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="adminPassword">Admin Password</label>
          <div class="password-wrapper">
            <input type="password" id="adminPassword" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="toggle-password" id="togglePassword">Show</button>
          </div>
        </div>
        <button type="submit" id="authBtn">
          <span class="button-text" id="authBtnText">Authorize & Connect</span>
          <span class="loading" id="authLoading"><span class="spinner"></span> Authenticating...</span>
        </button>
      </form>
      <button class="back-link" id="backBtn">← Change cinema code</button>
    </div>

    <p class="footer">Box Office Desktop App v1.0.0</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://immqqxnblovkdvokfbef.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltbXFxeG5ibG92a2R2b2tmYmVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3NDYxOTcsImV4cCI6MjA4MzMyMjE5N30.5iHXz9vz5s0zBNbaBz8pl6xscKN23DdI9CNjkLnaYaY';

    let selectedCinema = null;

    // DOM elements
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const dot1 = document.getElementById('dot1');
    const dot2 = document.getElementById('dot2');
    const errorEl = document.getElementById('error');
    const slugInput = document.getElementById('cinemaSlug');

    // Normalize slug input
    slugInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    });

    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', () => {
      const pw = document.getElementById('adminPassword');
      const btn = document.getElementById('togglePassword');
      if (pw.type === 'password') { pw.type = 'text'; btn.textContent = 'Hide'; }
      else { pw.type = 'password'; btn.textContent = 'Show'; }
    });

    // Step 1: Verify cinema slug
    document.getElementById('slugForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const slug = slugInput.value.trim();
      if (!slug) { showError('Please enter your cinema code'); return; }

      setLoading('slug', true);
      hideError();

      try {
        const response = await fetch(
          `${SUPABASE_URL}/rest/v1/organizations_public?slug=eq.${slug}&select=id,name,slug,logo_url,primary_color`,
          { headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' } }
        );

        if (!response.ok) throw new Error('Network error');
        const data = await response.json();

        if (!data || data.length === 0) {
          showError('Cinema not found. Please check your code and try again.');
          setLoading('slug', false);
          return;
        }

        selectedCinema = data[0];
        document.getElementById('cinemaNameDisplay').textContent = selectedCinema.name;
        document.getElementById('cinemaSlugDisplay').textContent = `Code: ${selectedCinema.slug}`;

        // Move to step 2
        step1.classList.remove('active');
        step2.classList.add('active');
        dot2.classList.add('active');
        hideError();
        document.getElementById('adminEmail').focus();
      } catch (error) {
        console.error('Error:', error);
        showError('Unable to verify cinema. Please check your internet connection.');
      } finally {
        setLoading('slug', false);
      }
    });

    // Step 2: Authenticate admin
    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value.trim();
      const password = document.getElementById('adminPassword').value;

      if (!email || !password) { showError('Please enter both email and password'); return; }

      setLoading('auth', true);
      hideError();

      try {
        // 1. Authenticate via Supabase Auth
        const authResponse = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        if (!authResponse.ok) {
          const authError = await authResponse.json().catch(() => null);
          if (authResponse.status === 400) {
            showError('Invalid email or password.');
          } else {
            showError('Authentication failed. Please try again.');
          }
          setLoading('auth', false);
          return;
        }

        const authData = await authResponse.json();
        const userId = authData.user?.id;
        const accessToken = authData.access_token;

        if (!userId || !accessToken) {
          showError('Authentication failed. Please try again.');
          setLoading('auth', false);
          return;
        }

        // 2. Verify user has cinema_admin role for this organization
        const roleResponse = await fetch(
          `${SUPABASE_URL}/rest/v1/user_roles?user_id=eq.${userId}&organization_id=eq.${selectedCinema.id}&role=eq.cinema_admin&select=id`,
          {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${accessToken}`,
              'Content-Type': 'application/json'
            }
          }
        );

        if (!roleResponse.ok) {
          showError('Unable to verify permissions. Please try again.');
          setLoading('auth', false);
          return;
        }

        const roleData = await roleResponse.json();

        if (!roleData || roleData.length === 0) {
          showError('Access denied. Only cinema administrators can set up the Box Office app.');
          setLoading('auth', false);
          // Sign out the user since they don't have permission
          await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${accessToken}` }
          });
          return;
        }

        // 3. All checks passed — sign out (setup only, not persistent login) and save config
        await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${accessToken}` }
        });

        // Save configuration
        await window.electronAPI.saveCinemaConfig({
          cinemaSlug: selectedCinema.slug,
          cinemaName: selectedCinema.name,
          cinemaId: selectedCinema.id,
          logoUrl: selectedCinema.logo_url,
          primaryColor: selectedCinema.primary_color,
          configuredAt: new Date().toISOString(),
          authorizedBy: email
        });

        // Navigate to Box Office
        await window.electronAPI.navigateToBoxOffice(selectedCinema.slug);

      } catch (error) {
        console.error('Error:', error);
        showError('Something went wrong. Please check your internet connection.');
        setLoading('auth', false);
      }
    });

    // Back button
    document.getElementById('backBtn').addEventListener('click', () => {
      step2.classList.remove('active');
      step1.classList.add('active');
      dot2.classList.remove('active');
      hideError();
      document.getElementById('adminEmail').value = '';
      document.getElementById('adminPassword').value = '';
      selectedCinema = null;
    });

    function showError(message) { errorEl.textContent = message; errorEl.classList.add('show'); }
    function hideError() { errorEl.classList.remove('show'); }

    function setLoading(step, loading) {
      if (step === 'slug') {
        document.getElementById('slugBtn').disabled = loading;
        document.getElementById('slugBtnText').style.display = loading ? 'none' : 'inline';
        document.getElementById('slugLoading').classList.toggle('show', loading);
      } else {
        document.getElementById('authBtn').disabled = loading;
        document.getElementById('authBtnText').style.display = loading ? 'none' : 'inline';
        document.getElementById('authLoading').classList.toggle('show', loading);
      }
    }
  </script>
</body>
</html>
